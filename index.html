<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NS Turing</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="app">
        <!-- Header -->
        <div id="panel-header">
            <span class="panel-title"><img src="icons/panel-light.png" width="20" height="20" alt="" class="panel-title-icon" data-icon="panel-icon">NS Turing</span>
            <div class="header-right">
                <span id="btn-settings" class="icon-btn" role="button" tabindex="0" title="设置"><img src="icons/settings-light.svg" width="18" height="18" alt="" data-icon="settings"></span>
            </div>
        </div>

        <!-- Prompt Section -->
        <div class="section">
            <label class="section-label">提示词 (Prompt)</label>
            <textarea id="prompt-input" class="prompt-textarea" rows="3"
                placeholder="描述你想要生成的图片内容..."></textarea>
        </div>

        <!-- Reference Images Section -->
        <div class="section">
            <div class="section-header">
                <label class="section-label">参考图</label>
                <span id="ref-count" class="badge">0/10</span>
            </div>

            <!-- Canvas as reference -->
            <label class="checkbox-row">
                <input type="checkbox" id="chk-canvas-ref" />
                <span>使用当前画布作为参考图</span>
            </label>

            <!-- Layer selection -->
            <label class="checkbox-row">
                <input type="checkbox" id="chk-layer-ref" />
                <span>从图层选择参考图</span>
            </label>
            <div id="layer-picker-container" class="layer-picker hidden">
                <button id="btn-refresh-layers" class="small-btn">刷新图层</button>
                <div id="layer-list" class="layer-list"></div>
            </div>

            <!-- Uploaded references -->
            <div id="ref-grid" class="ref-grid"></div>
            <button id="btn-upload-ref" class="small-btn">+ 上传参考图</button>
            <input type="file" id="ref-file-input" accept="image/*" multiple style="display:none" />
        </div>

        <!-- Progress -->
        <div id="progress-container" class="progress-container hidden">
            <div class="progress-bar-bg">
                <div id="progress-bar-fill" class="progress-bar-fill"></div>
            </div>
            <span id="progress-text" class="progress-text">0%</span>
        </div>

        <!-- Status -->
        <div id="status-bar" class="status-bar"></div>

        <!-- Model Selection (above Generate to avoid dropdown occlusion) -->
        <div class="section">
            <label class="section-label">模型</label>
            <div id="model-picker" class="model-picker model-picker-bottom">
                <span id="model-picker-btn" class="model-picker-btn" role="button" tabindex="0" title="切换模型">
                    <span id="model-picker-label">GPT-image-2</span>
                    <span class="icon-svg icon-chevron-svg"><img src="icons/chevron-down-light.svg" width="10" height="10" alt="" data-icon="chevron-down"></span>
                </span>
                <div id="model-picker-dropdown" class="model-picker-dropdown hidden"></div>
            </div>
        </div>

        <!-- Generate Button -->
        <button id="btn-generate" class="generate-btn">生成图片</button>
    </div>

    <!-- Settings Page (independent page, replaces #app when shown) -->
    <div id="settings-page" class="settings-page hidden">
        <div class="settings-header">
            <span id="btn-back-settings" class="icon-btn" role="button" tabindex="0" title="返回"><img src="icons/chevron-left-light.svg" width="18" height="18" alt="" data-icon="chevron-left"></span>
            <span class="settings-title">API 服务商管理</span>
            <span></span>
        </div>
        <div class="settings-body">
            <!-- Provider List -->
            <div id="provider-list" class="provider-list"></div>
    
            <!-- Add Provider Button -->
            <button id="btn-add-provider" class="small-btn provider-add-btn">+ 添加服务商</button>
    
            <!-- Status -->
            <div id="settings-status" class="settings-status"></div>
    
            <!-- Provider Form - Step 1: Create (name + type only) -->
            <div id="provider-form" class="provider-form hidden">
                <div class="provider-form-header">
                    <span id="provider-form-title">添加服务商</span>
                    <span id="btn-cancel-provider" class="icon-btn" role="button" tabindex="0"><img src="icons/close-light.svg" width="18" height="18" alt="" data-icon="close"></span>
                </div>
            
                <div class="form-group">
                    <label>服务商名称</label>
                    <input type="text" id="input-provider-name" class="form-input"
                        placeholder="例如：My OpenAI、公司内部代理..." />
                </div>
            
                <div class="form-group">
                    <label>接口类型</label>
                    <select id="select-provider-type" class="form-input provider-type-select">
                        <option value="openai">OpenAI</option>
                        <option value="gemini">Google Gemini</option>
                    </select>
                </div>
            
                <!-- Endpoint Info (read-only, updates based on type selection) -->
                <div class="provider-endpoint-info">
                    <div class="endpoint-info-row">
                        <span class="endpoint-label">文生图接口：</span>
                        <a id="link-t2i-doc" class="endpoint-link" target="_blank">查看文档</a>
                    </div>
                    <code id="code-t2i-endpoint" class="endpoint-code"></code>
                    <div class="endpoint-info-row">
                        <span class="endpoint-label">图生图接口：</span>
                        <a id="link-i2i-doc" class="endpoint-link" target="_blank">查看文档</a>
                    </div>
                    <code id="code-i2i-endpoint" class="endpoint-code"></code>
                </div>
            
                <button id="btn-save-provider" class="generate-btn">确认并创建服务商</button>
            </div>

            <!-- Provider Config Panel - Step 2: Configure (API Key + URL + Fetch Models) -->
            <div id="provider-config-panel" class="provider-config-panel hidden">
                <div class="provider-form-header">
                    <span id="provider-config-title">配置服务商</span>
                    <span id="btn-back-provider-list" class="icon-btn" role="button" tabindex="0"><img src="icons/close-light.svg" width="18" height="18" alt="" data-icon="close"></span>
                </div>

                <div class="form-group">
                    <label>API 密钥</label>
                    <div class="form-input-wrapper">
                        <input type="password" id="input-config-apikey" class="form-input form-input-with-btn"
                            placeholder="sk-... 或 AIza..." />
                        <span id="btn-toggle-apikey" class="toggle-key-btn" role="button" tabindex="0"
                            title="显示/隐藏 API Key"><img src="icons/eye-off-light.svg" width="18" height="18" alt="" data-icon="eye-off"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label>API 地址</label>
                    <input type="text" id="input-config-apiurl" class="form-input"
                        placeholder="https://api.openai.com" />
                </div>

                <button id="btn-fetch-models" class="small-btn fetch-btn">获取模型列表</button>
                <span id="fetch-models-status" class="fetch-status"></span>

                <!-- Model Checkbox List (shown after fetch) -->
                <div id="model-checkbox-list" class="model-checkbox-list hidden"></div>

                <button id="btn-save-provider-config" class="generate-btn">保存配置</button>
            </div>
        </div>
    </div>

    <!--
        Scripts loaded in DEPENDENCY ORDER (not ES modules - for UXP compatibility).
        Each file attaches its exports to the window object.
    -->
    <!-- Layer 0: Base (no dependencies) -->
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/photoshop.js"></script>
    <script src="js/utils/dom.js"></script>
    <script src="js/utils/image.js"></script>
    <!-- Layer 1: API (depends on Layer 0) -->
    <script src="js/api/provider.js"></script>
    <script src="js/api/openai.js"></script>
    <script src="js/api/gemini.js"></script>
    <script src="js/api/dispatcher.js"></script>
    <!-- Layer 2: Storage (depends on config.js) -->
    <script src="js/storage.js"></script>
    <!-- Layer 3: UI Components (depend on state, config, ps, storage) -->
    <script src="js/ui/panel.js"></script>
    <script src="js/ui/prompt.js"></script>
    <script src="js/ui/model-selector.js"></script>
    <script src="js/ui/progress.js"></script>
    <script src="js/ui/references.js"></script>
    <script src="js/ui/layers-picker.js"></script>
    <script src="js/ui/settings.js"></script>
    <!-- Layer 4: App Controller (depends on all above) -->
    <script src="js/app.js"></script>
    <!-- Layer 5: Entry Point -->
    <script src="main.js"></script>
</body>
</html>
